  <rect x="900" y="460" width="220" height="60" rx="8" fill="rgba(255,107,53,0.1)" stroke="#FF6B35" stroke-width="1"/>
  <text x="1010" y="485" font-family="Arial, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">Starting from</text>
  <text x="1010" y="508" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="#FF6B35" text-anchor="middle">₹8,000</text>
